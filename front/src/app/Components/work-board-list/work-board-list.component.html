<section>
    <div class="w-auto">
        @for(board of boards(); track board.id){
            <li class="list-row border-2 rounded-2xl mt-1 flex-col">
                        <div class="flex justify-around">

                            <div class="uppercase font-medium text-s text-center flex-auto m-4 w-1/2">NOMBRE: {{board.name}}</div>
                            <div class="uppercase font-medium text-s text-center flex-auto m-4 w-1/2">TIPO : {{board.type}}</div>

                        </div>
                        @for(group of board.groups; track group.id){
                            
                            <div class="flex justify-around">
                            
                                <div class="uppercase text-s text-center font-light w-1/2 m-4" [style.color]="group.color">{{group.id}}</div>
                                <div class="uppercase font-light text-s text-center w-1/2 m-4" [style.color]="group.color">{{group.title}}</div>
                        
                            </div>
                        }

                        <button class="btn btn-square btn-ghost">
                            <svg class="size-[1.2em]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none"
                                    stroke="white">
                                    <path d="M6 3L20 12 6 21 6 3z"></path>
                                </g>
                            </svg>
                        </button>
                        
                    </li>
        }
    </div>
</section>
